name: casedesk
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  go_router: ^17.2.1
  flutter_riverpod: ^3.3.1
  supabase_flutter: ^2.12.4
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  file_picker: ^8.0.0
  excel: ^4.0.6
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/